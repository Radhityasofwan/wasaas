name: 🚀 Auto Deploy WASAAS to VPS

on:
  push:
    branches:
      - main

# 🔒 Mencegah deploy tabrakan (kalau push berkali-kali)
concurrency:
  group: deploy-wasaas-main
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to VPS via SSH
    runs-on: ubuntu-latest

    steps:
      - name: 🚀 Deploy ke VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script_stop: true
          script: |
            set -e

            echo "===== 🚀 START DEPLOY $(date) ====="

            # =============================
            # 1. Masuk ke folder project
            # =============================
            cd /var/www/wasaas

            # =============================
            # 2. Sync dengan GitHub
            # =============================
            echo "📥 Pull latest code..."
            git fetch origin main
            git reset --hard origin/main

            # =============================
            # 3. Backend API
            # =============================
            echo "⚙️ Build Backend..."
            cd /var/www/wasaas/apps/api

            npm ci
            npm run build

            # Restart / Start PM2
            echo "🔄 Restart PM2..."
            pm2 describe wasaas-api > /dev/null 2>&1 && \
              pm2 restart wasaas-api --update-env || \
              pm2 start /var/www/wasaas/apps/api/dist/src/index.js --name "wasaas-api"

            pm2 save

            # =============================
            # 4. Frontend React
            # =============================
            echo "🎨 Build Frontend..."
            cd /var/www/wasaas/apps/web

            npm ci
            npm run build

            # =============================
            # 5. Reload Nginx (optional safe)
            # =============================
            echo "🌐 Reload Nginx..."
            nginx -t && systemctl reload nginx || echo "Nginx reload skipped"

            # =============================
            # 6. Cleanup optional
            # =============================
            echo "🧹 Cleanup..."
            npm cache clean --force || true

            # =============================
            # DONE
            # =============================
            echo "===== ✅ DEPLOY SUCCESS $(date) ====="
