name: Auto Deploy to VPS

on:
  push:
    branches:
      - main # Ganti dengan 'master' jika branch utama Anda bernama master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Eksekusi script deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          # Variabel ini akan otomatis diisi oleh GitHub dari menu Secrets
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            echo "Memulai deployment otomatis ke VPS..."
            
            # 1. Masuk ke folder project
            cd /var/www/wasaas
            
            # 2. Tarik kode terbaru
            git pull origin main
            
            # 3. Install & Restart Backend (API Node.js)
            echo "Memproses Backend API..."
            cd apps/api
            npm install
            npm run build --if-present
            pm2 restart wasaas-api || pm2 start index.js --name "wasaas-api"
            pm2 save
            
            # 4. Install & Build Frontend (Web React)
            echo "Memproses Frontend React..."
            cd ../web
            npm install
            npm run build
            
            echo "Deployment berhasil diselesaikan!"